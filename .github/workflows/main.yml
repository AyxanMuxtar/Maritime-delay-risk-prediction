name: Generate Predictions

on:
  schedule:
    - cron: '0 0 1 * *' # Runs automatically on the 1st of every month
  workflow_dispatch:    # Allows you to trigger it manually via the Actions tab

permissions:
  contents: write       # CRITICAL: Allows the Action to push the new CSV files back to GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Pull your code from GitHub into the virtual machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # You can change this if your model requires 3.9 or 3.11

      # 3. Install your Machine Learning libraries (pandas, xgboost, etc.)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run your actual model script
      - name: Run Prediction Script
        run: |
          python pipeline.py

      # 5. Save the generated predictions folder back to GitHub
      - name: Commit and push predictions to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update monthly delay predictions"
          file_pattern: 'predictions/**'